*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Jost',sans-serif;background:#ede8e3;color:#2d2c2c;margin:0;padding:0}

/* ── COVER ── */
#pg-cover{
  min-height:100vh;min-height:100dvh;
  background:#b1a79b;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:48px 32px 120px;
  position:relative;overflow:hidden
}
#pg-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.08) 0%,transparent 60%)}
.cv-label{font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(45,44,44,.55);margin-bottom:24px;position:relative;z-index:1}
.cv-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,10vw,4.4rem);font-weight:300;line-height:1.05;color:#2d2c2c;letter-spacing:.02em;text-transform:uppercase;position:relative;z-index:1}
.cv-line{width:80px;height:1px;background:#8a7e74;margin:20px auto 22px;position:relative;z-index:1}
.cv-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.95rem,3.2vw,1.12rem);font-weight:300;line-height:1.7;color:rgba(45,44,44,.75);max-width:280px;margin:0 auto 36px;position:relative;z-index:1}
.cv-btn{display:inline-block;padding:14px 40px;border:1px solid rgba(45,44,44,.5);background:transparent;color:#2d2c2c;font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;position:relative;z-index:10;-webkit-tap-highlight-color:rgba(92,82,72,.2);user-select:none}
.cv-btn:active{background:rgba(92,82,72,.12)}
.cv-bottom{position:absolute;bottom:20px;left:0;right:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center}
.cv-bottom-logo{width:160px;height:auto;opacity:.8;display:block;margin:0 auto}
.cv-ig{display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;color:#5c5248;opacity:.75;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.1em}

/* ── APP ── */
#pg-app{display:none;min-height:100vh;min-height:100dvh;background:#ede8e3}
.topbar{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;gap:8px;padding:0 10px;background:#5c5248;border-bottom:1px solid #4a4038;box-shadow:0 1px 6px rgba(45,44,44,.15)}
.tb-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:8px;color:#d4ccc6;font-size:1.1rem;flex-shrink:0;font-family:'Jost',sans-serif}
.tb-title{flex:1;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#f0ece7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#5c5248;border-top:1px solid #4a4038;display:flex;justify-content:space-around;align-items:center;padding:6px 4px;padding-bottom:max(6px,env(safe-area-inset-bottom));box-shadow:0 -1px 8px rgba(45,44,44,.12)}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border:none;background:transparent;cursor:pointer;font-size:.58rem;color:rgba(240,236,231,.5);font-family:'Jost',sans-serif;border-radius:8px}
.bn.on{color:#f0ece7;font-weight:500}
.bn-ic{font-size:1.25rem;line-height:1}
.content{padding-bottom:80px}

/* ── HOME ── */
.home{padding:28px 18px;text-align:center}
.h-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;line-height:1.1;color:#2d2c2c;text-transform:uppercase;letter-spacing:.02em}
.h-div{width:40px;height:1px;background:#8a7e74;margin:14px auto}
.h-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;font-weight:300;color:#8a7e74;line-height:1.75;max-width:280px;margin:0 auto 24px}
.progress-wrap{margin-bottom:20px;text-align:left;background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(45,44,44,.08)}
.progress-header{display:flex;justify-content:space-between;font-size:.72rem;color:#8a7e74;margin-bottom:8px}
.progress-bar{height:3px;background:#d4ccc6;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#5c5248;border-radius:2px;transition:width .6s}
.progress-sub{font-size:.68rem;color:#a09690;margin-top:6px}
.achievement{background:linear-gradient(135deg,#f0ece7,#e8e2db);border:1px solid #b1a79b;border-radius:10px;padding:14px 16px;margin-bottom:20px;text-align:left}
.ach-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:#2d2c2c;margin-bottom:4px}
.ach-sub{font-size:.78rem;color:#5c5248;margin-bottom:10px;line-height:1.5}
.btn-p{display:inline-block;padding:11px 28px;border:1px solid #5c5248;background:#5c5248;color:#f0ece7;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:6px;margin:5px}
.btn-p:active{background:#4a4038}
.btn-o{display:inline-block;padding:11px 28px;border:1px solid #8a7e74;background:transparent;color:#5c5248;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:6px;margin:5px}

/* ── STATS ── */
.stats-row{display:flex;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(45,44,44,.07);margin-bottom:0}
.stat-cell{flex:1;padding:14px 10px;text-align:center}
.stat-cell+.stat-cell{border-left:1px solid #e8e2db}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#2d2c2c}
.stat-l{font-size:.65rem;color:#8a7e74;letter-spacing:.08em;margin-top:2px}

/* ── CHAPTER LIST ── */
.ch-list{padding:20px 16px}
.cl-h{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:#2d2c2c;margin-bottom:4px}
.cl-s{font-size:.76rem;color:#8a7e74;margin-bottom:18px}
.card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #d4ccc6;border-radius:10px;padding:13px 16px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 4px rgba(45,44,44,.06)}
.card:active{background:#f5f1ed}
.c-num{width:34px;height:34px;border-radius:50%;background:#f5f1ed;border:1px solid #b1a79b;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;color:#5c5248;flex-shrink:0}
.c-num.done{background:#5c5248;color:#fff;border-color:#5c5248}
.c-info{flex:1;min-width:0}
.c-name{font-size:.9rem;color:#2d2c2c;font-weight:400}
.c-desc{font-size:.74rem;color:#8a7e74;margin-top:2px;font-style:italic}
.c-arr{color:#b1a79b;font-size:1rem;flex-shrink:0}

/* ── CHAPTER DETAIL ── */
.ch-hero{color:#fff;padding:28px 20px 24px;position:relative;overflow:hidden}
.ch-hero::before{content:'';position:absolute;top:-50px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.07)}
.ch-num-lbl{font-size:.67rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:8px}
.ch-title-lbl{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;line-height:1.15;margin-bottom:14px}
.ch-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;line-height:1.65;color:rgba(255,255,255,.85);border-left:2px solid rgba(255,255,255,.4);padding-left:12px}
.ch-qs{background:#fff;padding:16px 20px;border-bottom:1px solid #d4ccc6}
.qs-lbl{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:#8a7e74;font-weight:500;margin-bottom:10px}
.q-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.q-dot{width:5px;height:5px;border-radius:50%;background:#5c5248;flex-shrink:0;margin-top:7px}
.q-txt{font-size:.87rem;line-height:1.5;color:#2d2c2c}
.write-wrap{padding:14px 16px;background:#ede8e3}
.write-card{background:#fff;border:1px solid #d4ccc6;border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(45,44,44,.06)}
.write-hd{padding:10px 14px;background:#f5f1ed;border-bottom:1px solid #d4ccc6;display:flex;justify-content:space-between;align-items:center}
.wh-lbl{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:#5c5248;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.wh-cc{font-size:.67rem;color:#b1a79b;flex-shrink:0}
.ta{display:block;width:100%;min-height:160px;padding:12px 14px;border:none;outline:none;background:transparent;resize:vertical;font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.85;color:#2d2c2c;caret-color:#5c5248;background-image:repeating-linear-gradient(transparent,transparent 29px,#d4ccc6 29px,#d4ccc6 30px);background-attachment:local}
.ta::placeholder{color:#b1a79b;font-style:italic}
.save-row{padding:0 16px 16px;background:#ede8e3}
.save-btn{padding:11px 32px;border:1px solid #5c5248;background:#5c5248;color:#fff;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:6px}
.nav-row{display:flex;gap:10px;padding:0 16px 32px;background:#ede8e3}
.nav-prev{flex:1;padding:11px;border-radius:8px;border:1px solid #b1a79b;background:#fff;cursor:pointer;font-family:'Jost',sans-serif;font-size:.82rem;color:#5c5248}
.nav-next{flex:1;padding:11px;border-radius:8px;border:none;background:#5c5248;color:#fff;cursor:pointer;font-family:'Jost',sans-serif;font-size:.82rem}

/* ── STATIC PAGES ── */
.static-pg{max-width:600px;margin:0 auto;padding:28px 20px 40px}
.st-h{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:#2d2c2c;margin-bottom:6px}
.st-div{width:36px;height:1px;background:#8a7e74;margin-bottom:20px}
.st-body{font-size:.93rem;line-height:1.85;color:#3d3c3c}
.st-body p{margin-bottom:1.1em}

/* ── PRINT SCREEN ── */
.print-screen{padding-bottom:40px}
.print-hero{background:linear-gradient(135deg,#5c5248 0%,#4a4038 100%);color:#fff;padding:32px 20px 28px;text-align:center;position:relative;overflow:hidden}
.print-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(177,167,155,.25) 0%,transparent 60%)}
.ph-icon{font-size:2.5rem;margin-bottom:10px;position:relative}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;margin-bottom:8px;position:relative}
.ph-sub{font-size:.82rem;color:rgba(255,255,255,.75);line-height:1.6;max-width:280px;margin:0 auto;position:relative}
.print-stats{display:flex;background:rgba(255,255,255,.12);margin-top:16px;position:relative}
.ps-cell{flex:1;padding:10px;text-align:center}
.ps-cell+.ps-cell{border-left:1px solid rgba(255,255,255,.15)}
.ps-n{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#fff}
.ps-l{font-size:.65rem;color:rgba(255,255,255,.65);letter-spacing:.08em}
.print-steps{padding:20px 16px 0}
.step-block{margin-bottom:22px}
.step-lbl{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#5c5248;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.step-n{width:20px;height:20px;border-radius:50%;background:#5c5248;color:#fff;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.theme-card{border:2px solid #d4ccc6;border-radius:10px;padding:12px 10px;cursor:pointer;text-align:center;background:#fff;-webkit-tap-highlight-color:transparent;transition:border-color .2s;box-shadow:0 1px 4px rgba(45,44,44,.06)}
.theme-card.sel{border-color:#5c5248}
.th-preview{width:100%;height:60px;border-radius:6px;margin-bottom:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.72rem}
.th-name{font-size:.75rem;color:#5c5248;font-weight:500}
.photo-area{border:2px dashed #b1a79b;border-radius:10px;padding:22px 16px;text-align:center;cursor:pointer;background:#fff}
#photoPreview{width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:none}
.photo-hint{font-size:.82rem;color:#8a7e74;line-height:1.5}
.photo-hint strong{display:block;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#2d2c2c;margin-bottom:4px;font-weight:400}
input[type=file]{display:none}
.field-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field-label{font-size:.75rem;color:#5c5248;font-weight:500}
.field-input{width:100%;padding:11px 14px;border:1px solid #d4ccc6;border-radius:8px;background:#fff;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#2d2c2c;outline:none}
.field-input:focus{border-color:#5c5248}
.field-ta{min-height:80px;resize:vertical;line-height:1.6}
.preview-wrap{padding:0 16px;margin-bottom:20px}
.preview-lbl{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#5c5248;font-weight:500;margin-bottom:10px}
.book-preview{width:100%;max-width:200px;margin:0 auto;border-radius:3px 10px 10px 3px;box-shadow:-4px 0 0 #2d2c2c,-6px 2px 12px rgba(45,44,44,.3),0 4px 20px rgba(45,44,44,.15);overflow:hidden;position:relative;aspect-ratio:2/3;display:flex;flex-direction:column}
.bp-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.25}
.bp-overlay{position:absolute;inset:0}
.bp-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:18px;text-align:center}
.bp-pub{font-size:.4rem;letter-spacing:.12em;text-transform:uppercase;opacity:.6;margin-bottom:14px}
.bp-name{font-family:'Cormorant Garamond',serif;font-size:.68rem;font-weight:300;opacity:.8;margin-bottom:5px;letter-spacing:.04em}
.bp-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;line-height:1.15}
.bp-line{width:28px;height:1px;margin:9px auto;opacity:.45}
.bp-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.44rem;opacity:.7;line-height:1.5;max-width:110px}
.bp-dedica{font-size:.4rem;opacity:.5;margin-top:auto;font-style:italic;padding-top:8px}
.action-section{padding:0 16px}
.action-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;margin-bottom:14px;color:#2d2c2c;text-align:center}
.action-btn{display:flex;align-items:center;gap:14px;width:100%;padding:15px 18px;border-radius:12px;border:none;cursor:pointer;margin-bottom:10px;text-align:left;font-family:'Jost',sans-serif}
.ab-primary{background:#5c5248;color:#fff;box-shadow:0 4px 16px rgba(92,82,72,.3)}
.ab-primary:active{background:#4a4038}
.ab-amazon{background:#ff9900;color:#111}
.ab-icon{font-size:1.5rem;flex-shrink:0}
.ab-text{flex:1}
.ab-title{font-size:.92rem;font-weight:500;display:block}
.ab-sub{font-size:.72rem;opacity:.75;display:block;margin-top:2px;line-height:1.4}
.cross-sell{margin:0 16px 16px;padding:14px 16px;background:#fff9f0;border:1px solid #f0d9b0;border-radius:10px}
.cs-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:#7a5a30;margin-bottom:5px}
.cs-sub{font-size:.78rem;color:#3d4a30;line-height:1.5;margin-bottom:10px}
.cs-btn{display:inline-block;padding:8px 18px;background:#ff9900;color:#111;border-radius:6px;font-size:.8rem;font-family:'Jost',sans-serif;text-decoration:none}
#loading-overlay{position:fixed;inset:0;background:rgba(45,44,44,.85);z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading-overlay.show{display:flex}
.lo-spin{width:40px;height:40px;border:3px solid #d4ccc6;border-top-color:#5c5248;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lo-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#f0ece7}
#toast-msg{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#2d2c2c;color:#f0ece7;padding:9px 20px;border-radius:50px;font-size:.82rem;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .25s}

/* ── HERO COLORS ── */
.h1{background:linear-gradient(135deg,#6b5c50,#4a3d32)}.h2{background:linear-gradient(135deg,#5c6b50,#3d4a32)}.h3{background:linear-gradient(135deg,#506b6b,#324a4a)}.h4{background:linear-gradient(135deg,#6b506b,#4a324a)}.h5{background:linear-gradient(135deg,#5c5248,#3d3830)}.h6{background:linear-gradient(135deg,#6b5050,#4a3232)}.h7{background:linear-gradient(135deg,#50506b,#32324a)}.h8{background:linear-gradient(135deg,#6b6b50,#4a4a32)}.h9{background:linear-gradient(135deg,#50506b,#383248)}.h10{background:linear-gradient(135deg,#506b50,#324a32)}.h11{background:linear-gradient(135deg,#6b5c50,#4a3d30)}.h12{background:linear-gradient(135deg,#5c506b,#3d3248)}.h13{background:linear-gradient(135deg,#6b5050,#4a3030)}.h14{background:linear-gradient(135deg,#506060,#324040)}.h15{background:linear-gradient(135deg,#5c5840,#3d3a28)}.hrif{background:linear-gradient(135deg,#5c5248,#3d3830)}
</style>
</head>

<script>
const CHAPTERS = JSON.parse("[{\"id\": \"c1\", \"num\": 1, \"cls\": \"h1\", \"title\": \"L\u2019incontro\", \"sub\": \"Quando qualcuno entra nella tua vita\", \"quote\": \"Ogni incontro significativo arriva per mostrarti qualcosa di te.\", \"prompts\": [\"Ripensando alle persone pi\u00f9 importanti della tua vita, quali somiglianze o temi ricorrenti riesci a riconoscere?\", \"Chi \u00e8 stata la persona che ha cambiato pi\u00f9 profondamente il tuo modo di vederti?\", \"C\u2019\u00e8 un incontro che ancora oggi non riesci a spiegerti del tutto?\", \"Come riconosci, nelle prime fasi di una relazione, se qualcuno sar\u00e0 importante per te?\"]}, {\"id\": \"c2\", \"num\": 2, \"cls\": \"h2\", \"title\": \"Il bisogno di essere visti\", \"sub\": \"Il desiderio di riconoscimento\", \"quote\": \"Non desideriamo essere amati: desideriamo essere riconosciuti.\", \"prompts\": [\"In quali relazioni, nel tempo, hai sentito il bisogno di nasconderti o di interpretare un ruolo per sentirti accettato?\", \"Quando ti sei sentito davvero visto da qualcuno, com\u2019era diverso dalle altre relazioni?\", \"C\u2019\u00e8 una parte di te che mostri raramente, che vorresti che qualcuno riconoscesse?\", \"In che modo cerchi attenzione o riconoscimento nelle tue relazioni oggi?\"]}, {\"id\": \"c3\", \"num\": 3, \"cls\": \"h3\", \"title\": \"I confini\", \"sub\": \"Dove finisci tu e inizia l\u2019altro\", \"quote\": \"Amare non significa fondersi, ma restare integri.\", \"prompts\": [\"In quali momenti o relazioni della tua vita hai detto \u201cs\u00ec\u201d mentre dentro sentivi un \u201cno\u201d, e cosa \u00e8 successo dopo?\", \"Chi ti ha insegnato, anche involontariamente, a non avere confini?\", \"Dove fai pi\u00f9 fatica a mettere limiti: con i familiari, gli amici, i partner o i colleghi?\", \"Cosa provi quando qualcuno supera un tuo confine senza accorgersene?\"]}, {\"id\": \"c4\", \"num\": 4, \"cls\": \"h4\", \"title\": \"La dipendenza affettiva\", \"sub\": \"Quando l\u2019amore diventa bisogno\", \"quote\": \"Quando l\u2019altro diventa indispensabile, smetti di essere libero.\", \"prompts\": [\"Guardando alle tue relazioni passate o presenti, cosa hai temuto di perdere all\u2019idea di restare solo?\", \"Hai mai continuato una relazione pi\u00f9 per paura della solitudine che per scelta?\", \"Come distingui, in te stesso, il desiderio di stare con qualcuno dalla necessit\u00e0 di averlo?\", \"In quale relazione ti sei sentito pi\u00f9 dipendente, e cosa ti ha dato quella dipendenza?\"]}, {\"id\": \"c5\", \"num\": 5, \"cls\": \"h5\", \"title\": \"Dare e ricevere\", \"sub\": \"L\u2019equilibrio nei legami\", \"quote\": \"Una relazione sana non \u00e8 equilibrata nei gesti, ma nel valore.\", \"prompts\": [\"In quali relazioni hai dato pi\u00f9 di quanto potevi, e come questo ha inciso su di te nel tempo?\", \"Ti riesce pi\u00f9 facile dare o ricevere? Da cosa pensi dipenda?\", \"C\u2019\u00e8 qualcuno a cui hai continuato a dare senza ricevere nulla in cambio. Come mai?\", \"Quando qualcuno ti offre qualcosa \u2014 affetto, aiuto, attenzione \u2014 come reagisci?\"]}, {\"id\": \"c6\", \"num\": 6, \"cls\": \"h6\", \"title\": \"La paura dell\u2019abbandono\", \"sub\": \"Il timore di restare soli\", \"quote\": \"La paura di essere lasciati nasce molto prima di chi ci lascia.\", \"prompts\": [\"Quando qualcuno si \u00e8 allontanato dalla tua vita, quali storie hai raccontato a te stesso per spiegare quell\u2019assenza?\", \"Hai mai fatto qualcosa che non volevi fare pur di non essere lasciato?\", \"Dove pensi abbia origine la tua paura dell\u2019abbandono?\", \"Come si manifesta questa paura nel tuo comportamento quotidiano con chi ami?\"]}, {\"id\": \"c7\", \"num\": 7, \"cls\": \"h7\", \"title\": \"Il conflitto\", \"sub\": \"Ci\u00f2 che emerge quando qualcosa si rompe\", \"quote\": \"Il conflitto non distrugge le relazioni: rivela ci\u00f2 che erano gi\u00e0.\", \"prompts\": [\"Ripensando ai conflitti vissuti, come hai reagito quando ti sei sent var PS = {theme:THEMES[0], name:"", dedica:"", photo:null};
const S = (k,v) => { try{localStorage.setItem("ccpei_"+k,v);}catch(e){} };
const G = (k,d) => { try{return localStorage.getItem("ccpei_"+k)??(d||"");}catch(e){return d||"";} };

function hasTxt(ch){ return ch.prompts.some(function(_,j){return G(ch.id+"_"+j).trim().length>0;}); }
function totalWords(){
  var w=0;
  CHAPTERS.forEach(function(ch){
    ch.prompts.forEach(function(_,j){
      var v=G(ch.id+"_"+j);
      if(v.trim()) w+=v.trim().split(/\s+/).length;
    });
  });
  return w;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

var currentTab="home", currentChapter=null, prevTab=null;

document.addEventListener("DOMContentLoaded", function(){
  PS.theme = THEMES[parseInt(G("ptheme","0"))]||THEMES[0];
  PS.name  = G("pname");
  PS.dedica= G("pdedica");
  PS.photo = G("pphoto")||null;
  document.getElementById("enterBtn").addEventListener("click", function(){
    document.getElementById("pg-cover").style.display="none";
    document.getElementById("pg-app").style.display="block";
    showTab("home");
  });
});

function showTab(tab){
  currentTab=tab; currentChapter=null;
  document.getElementById("backBtn").style.display="none";
  document.getElementById("tb-title").textContent="Con Chi Posso Essere Io";
  for(var i=0;i<5;i++){var el=document.getElementById("bn"+i);if(el)el.classList.remove("on");}
  var map={home:"bn0",intro:"bn1",howto:"bn2",chapters:"bn3",print:"bn4"};
  var a=document.getElementById(map[tab]);if(a)a.classList.add("on");
  if(tab==="home") renderHome();
  else if(tab==="intro") renderIntro();
  else if(tab==="howto") renderHowTo();
  else if(tab==="chapters") renderChapterList();
  else if(tab==="print") renderPrint();
}

function goBack(){
  if(currentChapter!==null) showTab("chapters");
  else showTab(prevTab||"home");
}
function setTitle(t){document.getElementById("tb-title").textContent=t;}

function openChapter(idx){
  prevTab=currentTab; currentChapter=idx;
  var ch=CHAPTERS[idx];
  document.getElementById("backBtn").style.display="flex";
  setTitle(ch.num>0?"Capitolo "+ch.num:"Riflessioni");
  for(var i=0;i<5;i++){var el=document.getElementById("bn"+i);if(el)el.classList.remove("on");}
  renderChapterDetail(idx);
}

function renderChapterList(){
  setTitle("Capitoli");
  var h="<div class=\"ch-list\"><div class=\"cl-h\">Capitoli</div><div class=\"cl-s\">15 capitoli + Riflessioni</div>";
  CHAPTERS.forEach(function(ch,i){
    var done=hasTxt(ch);
    h+="<div class=\"card\" data-idx=\""+i+"\">"+
      "<div class=\"c-num"+(done?" done":"")+"\">"+( ch.num>0?ch.num:"R")+"</div>"+
      "<div class=\"c-info\"><div class=\"c-name\">"+esc(ch.title)+"</div><div class=\"c-desc\">"+esc(ch.sub)+"</div></div>"+
      "<div class=\"c-arr\">&#8250;</div></div>";
  });
  h+="</div>";
  document.getElementById("content").innerHTML=h;
  document.querySelectorAll(".card").forEach(function(el){
    el.addEventListener("click",function(){openChapter(parseInt(el.dataset.idx));});
  });
}

function renderChapterDetail(idx){
  var ch=CHAPTERS[idx];
  var label=ch.num>0?"Capitolo "+ch.num:"Riflessioni";
  var qdots="";
  ch.prompts.forEach(function(p){
    qdots+="<div class=\"q-row\"><div class=\"q-dot\"></div><div class=\"q-txt\">"+esc(p)+"</div></div>";
  });
  var cards="";
  ch.prompts.forEach(function(p,j){
    var val=G(ch.id+"_"+j);
    var wc=val.trim()?val.trim().split(/\s+/).length:0;
    cards+="<div class=\"write-card\">"+
      "<div class=\"write-hd\"><span class=\"wh-lbl\">"+esc(p)+"</span>"+
      "<span class=\"wh-cc\" id=\"wc_"+ch.id+"_"+j+"\">"+wc+" parole</span></div>"+
      "<textarea class=\"ta\" id=\"ta_"+ch.id+"_"+j+"\" placeholder=\"Scrivi qui...\" rows=\"6\">"+esc(val)+"</textarea>"+
      "</div>";
  });
  var prevDis=idx===0, nextDis=idx===CHAPTERS.length-1;
  document.getElementById("content").innerHTML=
    "<div class=\"ch-hero "+ch.cls+"\">"+
    "<div class=\"ch-num-lbl\">"+label+"</div>"+
    "<div class=\"ch-title-lbl\">"+esc(ch.title)+"</div>"+
    "<div class=\"ch-quote\">"+esc(ch.quote)+"</div></div>"+
    "<div class=\"ch-qs\"><div class=\"qs-lbl\">Domande guida</div>"+qdots+"</div>"+
    "<div class=\"write-wrap\">"+cards+"</div>"+
    "<div class=\"save-row\"><button class=\"save-btn\" id=\"save-ch\">Salva &#10003;</button></div>"+
    "<div class=\"cross-sell\"><div class=\"cs-title\">&#128214; Hai anche il libro fisico?</div>"+
    "<div class=\"cs-sub\">Scrivere a mano aggiunge un livello in pi&ugrave; alla tua riflessione.</div>"+
    "<a class=\"cs-btn\" href=\""+AMAZON+"\" target=\"_blank\" rel=\"noopener\">Amazon &rarr;</a></div>"+
    "<div class=\"nav-row\">"+
    "<button class=\"nav-prev\" id=\"nav-p\">"+(prevDis?" disabled style=\"opacity:.4\"":"")+">&#8592; Precedente</button>"+
    "<button class=\"nav-next\" id=\"nav-n\""+(nextDis?" disabled style=\"opacity:.4\"":"")+">Successivo &#8594;</button>"+
    "</div>";

  ch.prompts.forEach(function(_,j){
    var ta=document.getElementById("ta_"+ch.id+"_"+j);
    if(!ta) return;
    ta.addEventListener("input",function(){
      S(ch.id+"_"+j,ta.value);
      var wc=ta.value.trim()?ta.value.trim().split(/\s+/).length:0;
      var el=document.getElementById("wc_"+ch.id+"_"+j);
      if(el) el.textContent=wc+" parole";
    });
  });
  document.getElementById("save-ch").addEventListener("click",function(){saveChapter(idx);});
  var np=document.getElementById("nav-p");
  if(np&&!prevDis) np.addEventListener("click",function(){openChapter(idx-1);});
  var nn=document.getElementById("nav-n");
  if(nn&&!nextDis) nn.addEventListener("click",function(){openChapter(idx+1);});
}

function saveChapter(idx){
  var ch=CHAPTERS[idx];
  ch.prompts.forEach(function(_,j){
    var ta=document.getElementById("ta_"+ch.id+"_"+j);
    if(ta) S(ch.id+"_"+j,ta.value);
  });
  showToast("Salvato &#10003;");
}

function renderPrint(){
  setTitle("Il mio libro");
  var filled=CHAPTERS.filter(hasTxt).length, words=totalWords();
  var thG="<div class=\"theme-grid\">";
  THEMES.forEach(function(th){
    thG+="<div class=\"theme-card"+(PS.theme.id===th.id?" sel":"")+"\" data-tid=\""+th.id+"\">"+
      "<div class=\"th-preview\" style=\"background:"+th.bg+";\">"+"<span style=\"color:"+th.tc+";font-size:.65rem;font-family:Cormorant Garamond,serif;\">Con Chi<br>Posso Essere Io</span>"+
      "</div><div class=\"th-name\">"+th.name+"</div></div>";
  });
  thG+="</div>";
  var t=PS.theme;
  document.getElementById("content").innerHTML=
    "<div class=\"print-screen\">"+
    "<div class=\"print-hero\"><div class=\"ph-icon\">&#10024;</div>"+
    "<div class=\"ph-title\">Il mio libro</div>"+
    "<div class=\"ph-sub\">Personalizza la copertina e genera il PDF da stampare</div>"+
    "<div class=\"print-stats\">"+
    "<div class=\"ps-cell\"><div class=\"ps-n\">"+filled+"</div><div class=\"ps-l\">CAPITOLI SCRITTI</div></div>"+
    "<div class=\"ps-cell\"><div class=\"ps-n\">"+words+"</div><div class=\"ps-l\">PAROLE SCRITTE</div></div>"+
    "</div></div>"+
    "<div class=\"print-steps\">"+
    "<div class=\"step-block\"><div class=\"step-lbl\"><div class=\"step-n\">1</div>Scegli il tema della copertina</div>"+thG+"</div>"+
    "<div class=\"step-block\"><div class=\"step-lbl\"><div class=\"step-n\">2</div>Aggiungi una tua foto (opzionale)</div>"+
    "<div class=\"photo-area\" id=\"photoArea\"><img id=\"photoPreview\" alt=\"\">"+
    "<div id=\"photoHint\" class=\"photo-hint\"><strong>Tocca per caricare una foto</strong>Apparir&agrave; in copertina con un effetto elegante</div>"+
    "</div><input type=\"file\" id=\"photoInput\" accept=\"image/*\"></div>"+
    "<div class=\"step-block\"><div class=\"step-lbl\"><div class=\"step-n\">3</div>Personalizza il testo</div>"+
    "<div class=\"field-row\"><label class=\"field-label\">Il tuo nome (in copertina)</label>"+
    "<input class=\"field-input\" id=\"nameInput\" type=\"text\" placeholder=\"Il tuo nome\" value=\""+esc(PS.name)+"\"></div>"+
    "<div class=\"field-row\"><label class=\"field-label\">Dedica (opzionale)</label>"+
    "<textarea class=\"field-input field-ta\" id=\"dedicaInput\" placeholder=\"Per...\">"+esc(PS.dedica)+"</textarea></div></div>"+
    "<div class=\"preview-wrap\"><div class=\"preview-lbl\">ANTEPRIMA COPERTINA</div>"+
    "<div class=\"book-preview\">"+
    "<div class=\"bp-photo\" id=\"bp-photo\"></div>"+
    "<div class=\"bp-overlay\" style=\"background:"+t.ov+"\"></div>"+
    "<div class=\"bp-content\" style=\"background:"+t.bg+";\">" +
    "<div class=\"bp-pub\" style=\"color:"+t.tc+"\">UN PROGETTO EDITORIALE &middot; STUDIO B.</div>"+
    "<div class=\"bp-name\" style=\"color:"+t.tc+"\" id=\"bp-name\">"+esc(PS.name||"Il tuo nome")+"</div>"+
    "<div class=\"bp-title\" style=\"color:"+t.tc+"\">Con Chi Posso<br>Essere Io</div>"+
    "<div class=\"bp-line\" style=\"background:"+t.lc+"\"></div>"+
    "<div class=\"bp-sub\" style=\"color:"+t.tc+"\">Diario sulle relazioni</div>"+
    "<div class=\"bp-dedica\" style=\"color:"+t.tc+"\" id=\"bp-dedica\">"+esc(PS.dedica)+"</div>"+
    "</div></div></div>"+
    "<div class=\"action-section\"><div class=\"action-title\">Genera il tuo libro</div>"+
    "<button class=\"action-btn ab-primary\" id=\"btn-pdf\">"+
    "<span class=\"ab-icon\">&#128196;</span>"+
    "<span class=\"ab-text\"><span class=\"ab-title\">Scarica PDF da stampare</span>"+
    "<span class=\"ab-sub\">Formato A5 &middot; copertina personalizzata &middot; tutti i tuoi testi</span></span></button>"+
    "<a class=\"action-btn ab-amazon\" href=\""+AMAZON+"\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;\">"+
    "<span class=\"ab-icon\">&#128230;</span>"+
    "<span class=\"ab-text\"><span class=\"ab-title\">Acquista il libro fisico originale</span>"+
    "<span class=\"ab-sub\">Su Amazon &middot; spedizione rapida</span></span></a>"+
    "</div></div></div>";

  if(PS.photo){
    var pp=document.getElementById("photoPreview");
    if(pp){pp.src=PS.photo;pp.style.display="block";}
    var ph=document.getElementById("photoHint"); if(ph) ph.style.display="none";
    var bp=document.getElementById("bp-photo"); if(bp) bp.style.backgroundImage="url("+PS.photo+")";
  }

  document.querySelectorAll(".theme-card").forEach(function(el){
    el.addEventListener("click",function(){
      var th=THEMES.find(function(t){return t.id===el.dataset.tid;});
      if(th){PS.theme=th;S("ptheme",THEMES.indexOf(th));renderPrint();}
    });
  });
  document.getElementById("photoArea").addEventListener("click",function(){document.getElementById("photoInput").click();});
  document.getElementById("photoInput").addEventListener("change",function(){loadPhoto(this);});
  document.getElementById("nameInput").addEventListener("input",function(){PS.name=this.value;S("pname",PS.name);updatePreview();});
  document.getElementById("dedicaInput").addEventListener("input",function(){PS.dedica=this.value;S("pdedica",PS.dedica);updatePreview();});
  document.getElementById("btn-pdf").addEventListener("click",generatePDF);
}

function loadPhoto(input){
  if(!input.files[0]) return;
  var r=new FileReader();
  r.onload=function(e){
    PS.photo=e.target.result; S("pphoto",PS.photo);
    var pp=document.getElementById("photoPreview");
    if(pp){pp.src=PS.photo;pp.style.display="block";}
    var ph=document.getElementById("photoHint"); if(ph) ph.style.display="none";
    var bp=document.getElementById("bp-photo"); if(bp) bp.style.backgroundImage="url("+PS.photo+")";
  };
  r.readAsDataURL(input.files[0]);
}

function updatePreview(){
  var el1=document.getElementById("bp-name"); if(el1) el1.textContent=PS.name||"Il tuo nome";
  var el2=document.getElementById("bp-dedica"); if(el2) el2.textContent=PS.dedica;
}

async function generatePDF(){
  var overlay=document.getElementById("loading-overlay");
  overlay.classList.add("show");
  await new Promise(function(r){setTimeout(r,80);});
  try{
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a5"});
    var W=148,H=210;
    var t=PS.theme;
    for(var i=0;i<H;i++){
      var ratio=i/H;
      var r2=Math.round(t.bgc[0][0]+(t.bgc[1][0]-t.bgc[0][0])*ratio);
      var g2=Math.round(t.bgc[0][1]+(t.bgc[1][1]-t.bgc[0][1])*ratio);
      var b2=Math.round(t.bgc[0][2]+(t.bgc[1][2]-t.bgc[0][2])*ratio);
      doc.setFillColor(r2,g2,b2); doc.rect(0,i,W,1.2,"F");
    }
    if(PS.photo){
      try{doc.addImage(PS.photo,"JPEG",0,0,W,H,"","FAST");}catch(e){}
      doc.setFillColor(t.bgc[0][0],t.bgc[0][1],t.bgc[0][2]);
      doc.setGState(new doc.GState({opacity:0.7})); doc.rect(0,0,W,H,"F");
      doc.setGState(new doc.GState({opacity:1}));
    }
    var tcRGB=t.tc==="#f5f1ed"||t.tc==="#f0ece7"?[245,241,237]:[45,44,44];
    doc.setFontSize(6.5); doc.setTextColor(tcRGB[0],tcRGB[1],tcRGB[2]); doc.setFont("helvetica","normal");
    doc.text("UN PROGETTO EDITORIALE · STUDIO B.",W/2,28,{align:"center"});
    if(PS.name){doc.setFontSize(9);doc.setFont("helvetica","italic");doc.text(PS.name,W/2,40,{align:"center"});}
    doc.setFontSize(26); doc.setFont("helvetica","normal");
    doc.text("CON CHI POSSO",W/2,76,{align:"center"}); doc.text("ESSERE IO",W/2,90,{align:"center"});
    doc.setDrawColor(tcRGB[0],tcRGB[1],tcRGB[2]); doc.setLineWidth(.4); doc.line(W/2-22,98,W/2+22,98);
    doc.setFontSize(9); doc.setFont("helvetica","italic");
    var subL=doc.splitTextToSize("Diario guidato per esplorare relazioni, legami e intelligenza emotiva",90);
    doc.text(subL,W/2,110,{align:"center"});
    if(PS.dedica){doc.setFontSize(7.5);var dL=doc.splitTextToSize(PS.dedica,100);doc.text(dL,W/2,170,{align:"center"});}
    doc.setFontSize(6); doc.text("libridascrivere.com",W/2,198,{align:"center"});
    CHAPTERS.forEach(function(ch){
      if(!hasTxt(ch)) return;
      doc.addPage();
      doc.setFillColor(92,82,72); doc.rect(0,0,W,38,"F");
      doc.setFontSize(6.5);doc.setTextColor(212,204,198);doc.setFont("helvetica","normal");
      doc.text(ch.num>0?"CAPITOLO "+ch.num:"RIFLESSIONI",16,14);
      doc.setFontSize(17);doc.setTextColor(245,241,237);doc.setFont("helvetica","normal");
      var tLines=doc.splitTextToSize(ch.title,W-32); doc.text(tLines,16,25);
      var y=48;
      ch.prompts.forEach(function(p,j){
        var val=G(ch.id+"_"+j); if(!val.trim()) return;
        if(y>H-40){doc.addPage();y=16;}
        doc.setFontSize(7.5);doc.setTextColor(138,126,116);doc.setFont("helvetica","bold");
        var qL=doc.splitTextToSize(p,W-32); doc.text(qL,16,y); y+=qL.length*4.5+3;
        doc.setDrawColor(177,167,155);doc.setLineWidth(.3);doc.line(16,y,W-16,y);y+=5;
        doc.setFontSize(9.5);doc.setTextColor(45,44,44);doc.setFont("helvetica","normal");
        var tL=doc.splitTextToSize(val,W-32);
        tL.forEach(function(line){if(y>H-16){doc.addPage();y=16;}doc.text(line,16,y);y+=6;});
        y+=8;
      });
    });
    doc.save("con-chi-posso-essere-io.pdf");
    showToast("PDF scaricato &#10003;");
  }catch(e){showToast("Errore: "+e.message);}
  finally{overlay.classList.remove("show");}
}

function showToast(msg){
  var t=document.getElementById("toast-msg");
  t.innerHTML=msg; t.style.opacity="1";
  setTimeout(function(){t.style.opacity="0";},2200);
}

document.addEventListener("DOMContentLoaded", function(){showTab("home");});
